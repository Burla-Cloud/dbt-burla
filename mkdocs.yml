site_name: dbt-burla
site_description: A dbt adapter that runs Python models on a Burla cluster.
site_url: https://burla-cloud.github.io/dbt-burla/
repo_url: https://github.com/Burla-Cloud/dbt-burla
repo_name: Burla-Cloud/dbt-burla
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Burla-Cloud
      name: Burla on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/dbt-burla/
      name: dbt-burla on PyPI
    - icon: fontawesome/solid/globe
      link: https://burla.dev
      name: Burla

extra_css:
  - assets/landing.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - How it works: how-it-works.md
  - Configuration: configuration.md
  - Warehouses:
      - DuckDB: warehouses/duckdb.md
      - Snowflake: warehouses/snowflake.md
      - BigQuery: warehouses/bigquery.md
  - Troubleshooting: troubleshooting.md
