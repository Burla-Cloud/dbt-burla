name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify version matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg_version=$(uv run python -c "from dbt.adapters.burla.__version__ import __version__; print(__version__)")
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::Tag v$tag does not match package version $pkg_version"
            exit 1
          fi

      - name: Build
        run: uv build

      # Prefer the token secret (fast path). Falls back to trusted publishing
      # if the secret isn't set - configure via the `pypi` environment in repo
      # settings + a trusted publisher on PyPI to use that path.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          password: ${{ secrets.PYPI_TOKEN }}
