name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify version matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg_version=$(uv run python -c "from dbt.adapters.burla.__version__ import __version__; print(__version__)")
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::Tag v$tag does not match package version $pkg_version"
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Publish to PyPI via trusted publishing
        if: ${{ env.PYPI_TOKEN == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Publish to PyPI via token
        if: ${{ env.PYPI_TOKEN != '' }}
        run: uv publish --token "$PYPI_TOKEN" --check-url https://pypi.org/simple/
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
